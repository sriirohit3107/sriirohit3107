# Snake animation workflow for GitHub profile README
# Place this file at: .github/workflows/snake.yml in your sriirohit3107 repo

name: Generate Snake Animation

on:
  # Runs automatically every 12 hours
  schedule:
    - cron: "0 */12 * * *"

  # Allows you to run manually from Actions tab
  workflow_dispatch:

  # Runs on every push to main
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Generate Snake Animation (Dark Theme)
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: sriirohit3107
          outputs: |
            dist/github-snake-dark.svg?palette=github-dark&color_snake=00d4aa&color_dots=#0a0a0a,#003d33,#005c4a,#008c6e,#00d4aa

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
